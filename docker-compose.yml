version: '3.8'

services:
  # ── Semantic Memory Store ──────────────────────────────────────
  semantic_memory:
    image: chromadb/chroma:0.5.23
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    networks:
      - ares_net
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── ARES Orchestrator ──────────────────────────────────────────
  agent_orchestrator:
    build: .
    environment:
      - CHROMA_HOST=semantic_memory
      - CHROMA_PORT=8000
      - PYTHONPATH=/app/src
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ARES_ENV=docker
    depends_on:
      semantic_memory:
        condition: service_healthy
    networks:
      - ares_net
    # Runs the full pytest suite on startup (TDD validation)
    command: >
      sh -c "
        echo '[ARES] ChromaDB is healthy. Starting validation suite...' &&
        pytest tests/ --verbose --tb=short &&
        echo '[ARES] All tests passed. Starting main pipeline...' &&
        python src/main.py
      "

networks:
  ares_net:
    driver: bridge
